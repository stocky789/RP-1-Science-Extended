name: Bug report
description: In-game or config problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Include versions and steps when you can; it makes fixes much faster.
  - type: input
    id: versions
    attributes:
      label: Versions
      description: KSP, RP-1 Extended Science, Kerbalism config, RSS - whatever you know.
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: What happened
      description: Steps to reproduce, craft or part involved, expected vs actual.
    validations:
      required: true
