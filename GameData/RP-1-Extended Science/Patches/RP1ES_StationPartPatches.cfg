// RP-1 Extended Science station-tier part patches.
// Kerbalism Configure (separate from RP-1 capsule "Crew Science") so studies are optional equipment slots on habs.
// Kerbalism DataSize = scienceCap * dataScale (see RP1ES_Experiments.cfg). MODULE data_rate numerator = scienceCap/10 MiB over experiment duration.

@PART[*]:HAS[#TechRequired[spaceStationPrototypes],#CrewCapacity[>0]]:AFTER[zzzKerbalism]
{
	MODULE
	{
		name = Configure
		title = Long-Duration Crew Science
		slots = 2

		SETUP
		{
			name = None
			desc = Empty long-duration study slot (no added instrumentation mass).
		}
		SETUP
		{
			name = One-Year Crew Morale and Recreation Study
			desc = Tracks morale, stress, and off-duty routines while crew use consoles and shared recreation over a full year in low Earth orbit.
			tech = spaceStationPrototypes
			mass = 0

			MODULE
			{
				type = Experiment
				id_field = experiment_id
				id_value = RP1ES_OneYearConsoleGamingMoraleStudy
				ec_rate = 0.02
				data_rate = 9
				@data_rate /= 31536000
				requires = CrewMin:1
				crew_operate = True
				hide_when_unavailable = True
			}
		}
		SETUP
		{
			name = One-Year Crew Medical Baseline
			desc = Standard medical and workload telemetry across one year in orbit to anchor later long-duration comparisons.
			tech = spaceStationPrototypes
			mass = 0

			MODULE
			{
				type = Experiment
				id_field = experiment_id
				id_value = RP1ES_OneYearCrewHealthBaseline
				ec_rate = 0.03
				data_rate = 20
				@data_rate /= 31536000
				requires = CrewMin:2
				crew_operate = True
				hide_when_unavailable = True
			}
		}
	}
}

