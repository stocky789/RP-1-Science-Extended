// RP-1 Extended Science - crew capsules (non-station parts).
// Adds experiments as Kerbalism Configure SETUPs on RP-1's existing "Crew Science" module (see RP-1/Science/Configure.cfg), same pattern as Orbital Maneuvering / Visual Acuity.
// data_rate numerator = scienceCap/10 MiB over duration; divide by seconds (matches RP1ES_Experiments.cfg dataScale 0.1).

// Only parts that already have RP-1 "Crew Science" Configure (capsule tiers, etc.); station habs use RP1ES_StationPartPatches.cfg instead.
@PART[*]:HAS[#CrewCapacity[>0],~TechRequired[spaceStationPrototypes],~TechRequired[spaceStationDev],~TechRequired[earlySpaceStations],~TechRequired[modularSpaceStations],~TechRequired[largeScaleOrbitalCon],~TechRequired[improvedOrbitalConstruction],~TechRequired[inflatableHabitats],@MODULE[Configure]:HAS[#title[Crew?Science]]]:AFTER[zzzKerbalism]
{
	@MODULE[Configure]:HAS[#title[Crew?Science]]
	{
		SETUP
		{
			name = Crew Morale and Recreation Survey
			desc = Tracks morale, stress, and off-duty routines while crew use consoles and shared recreation over a full year in low Earth orbit.
			tech = lunarOrbiterCapsules
			mass = 0

			MODULE
			{
				type = Experiment
				id_field = experiment_id
				id_value = RP1ES_OneYearConsoleGamingMoraleStudy
				ec_rate = 0.02
				data_rate = 9
				@data_rate /= 31536000
				requires = CrewMin:1
				crew_operate = True
				hide_when_unavailable = True
			}
		}
		SETUP
		{
			name = Orbital Crew Health Baseline
			desc = Standard medical and workload telemetry across one year in orbit to anchor later long-duration comparisons.
			tech = lunarOrbiterCapsules
			mass = 0

			MODULE
			{
				type = Experiment
				id_field = experiment_id
				id_value = RP1ES_OneYearCrewHealthBaseline
				ec_rate = 0.03
				data_rate = 20
				@data_rate /= 31536000
				requires = CrewMin:2
				crew_operate = True
				hide_when_unavailable = True
			}
		}
		SETUP
		{
			name = Computer Workload Adaptation Study
			desc = Measures attention, sleep, and task performance while crew rely on computers for operations and downtime over two years.
			tech = lunarOrbiterCapsules
			mass = 0

			MODULE
			{
				type = Experiment
				id_field = experiment_id
				id_value = RP1ES_TwoYearComputerGamingAdaptationStudy
				ec_rate = 0.03
				data_rate = 16
				@data_rate /= 63072000
				requires = CrewMin:1
				crew_operate = True
				hide_when_unavailable = True
			}
		}
		SETUP
		{
			name = Microgravity Fungal Culture Study
			desc = Parallel fungal culture growth and crew physiology markers across two years in Earth or lunar orbit to study microgravity adaptation and contamination control.
			tech = lunarOrbiterCapsules
			mass = 0

			MODULE
			{
				type = Experiment
				id_field = experiment_id
				id_value = RP1ES_TwoYearMicrogravityAdaptationStudy
				ec_rate = 0.04
				data_rate = 35
				@data_rate /= 63072000
				requires = CrewMin:2
				crew_operate = True
				hide_when_unavailable = True
			}
		}
		SETUP
		{
			name = Crew Leisure and Daily Routine Study
			desc = Monitors morale, hobbies, sleep regularity, and off-duty structure across three years on the same vehicle and schedule.
			tech = lunarOrbiterCapsules
			mass = 0

			MODULE
			{
				type = Experiment
				id_field = experiment_id
				id_value = RP1ES_ThreeYearCrewLeisureDailyRoutineStudy
				ec_rate = 0.04
				data_rate = 26
				@data_rate /= 94608000
				requires = CrewMin:2
				crew_operate = True
				hide_when_unavailable = True
			}
		}
	}
}

// Generic crewed parts (mods, etc.): no RP-1 capsuleTier -> no RP-1 "Crew Science" Configure. Add our own Kerbalism Configure so studies stay optional slots, not always-on Experiment modules.
// Excludes every capsuleTier that RP-1 gives Crew Science in Science/Configure.cfg (cockpits through early station crew modules).
@PART[*]:HAS[#CrewCapacity[>0],~TechRequired[spaceStationPrototypes],~TechRequired[spaceStationDev],~TechRequired[earlySpaceStations],~TechRequired[modularSpaceStations],~TechRequired[largeScaleOrbitalCon],~TechRequired[improvedOrbitalConstruction],~TechRequired[inflatableHabitats],~#capsuleTier[Cockpit],~#capsuleTier[Basic],~#capsuleTier[SecondGen],~#capsuleTier[LunarOrbiter],~#capsuleTier[Mature],~#capsuleTier[EarlyLunarLander],~#capsuleTier[StationPrototypeAndDevelopment],~#capsuleTier[EarlyStation]]:AFTER[zzzKerbalism]
{
	MODULE
	{
		name = Configure
